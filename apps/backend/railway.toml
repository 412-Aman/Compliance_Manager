# Nixpacks configuration for Railway
# This file centralizes build and runtime settings

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["python -m venv /opt/venv && /opt/venv/bin/pip install -r requirements.txt"]

[start]
cmd = "/opt/venv/bin/uvicorn src.main:app --host 0.0.0.0 --port $PORT"

[variables]
# --- 🌍 APPLICATION CONFIGURATIONS ---
# You can change these here and Railway will apply them to the app
BACKEND_CORS_ORIGINS = "*"
PYTHONUNBUFFERED = "1"
DISABLE_WORKER = "false"
PROJECT_NAME = "AI Compliance Manager"
API_V1_STR = "/api/v1"
